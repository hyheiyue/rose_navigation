rose_navigation_map_node:
  ros__parameters:
    rose_map:
      odometry_topic: /Odometry
      pointcloud_topic: /cloud_registered
      target_frame: map
      sensor_frame: front_mid360
      max_update_rate: 10
      occ_map:
        log_hit: 0.85
        log_free: -0.3
        log_min: -5.0
        log_max: 10.0
        occ_th: 0.01       
        min_shift: 1
        timeout: 15.5
        unknown_is_occupied: false
        use_ray: true
        max_ray_range: 20.0
        voxel_map:
          center: [0.0, 0.0, 0.0]
          size: [17.0, 17.0, 1.0]
          voxel_size: 0.03
      bin_map:
        voxel_size: 0.05
        max_slope_deg: 30.0
        static_map_path: "/home/hy/rose_nav/src/bringup_nav/map/simulation/rmuc_2024.yaml"
      esdf:
        use_diagonals: true
        size: [17.0, 17.0]